name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: antonbogdan165
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark&color_snake=#00f5d4&color_dots=#0d1117,#0e4429,#006d32,#26a641,#39d353

      - name: Add ultra glow + smooth
        run: |
          sed -i 's/<svg /<svg style="filter: drop-shadow(0 0 8px #00f5d4) drop-shadow(0 0 16px #00f5d4)" /' dist/snake-dark.svg

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
